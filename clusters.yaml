    name: Bom Recipes Bom
    color: "#d0f0d0"
    description: |
      Auto-registered cluster for domain proposal. Rename + describe
      in clusters.yaml when curating.
  - id: bom_recipes_resource
    name: Bom Recipes Resource
    color: "#ffe8f0"
    description: |
