- id: AUSP
  name: Object Characteristic Values
  cluster: classification_assignment
  description: Stores classification characteristic values per object. OBJEK is polymorphic
    — it can be MATNR, MATNR+CHARG, or an INOB-mapped CUOBJ for compound-key objects
    (BOM, routing). Always filter by KLART (class type) and ATINN (characteristic).
