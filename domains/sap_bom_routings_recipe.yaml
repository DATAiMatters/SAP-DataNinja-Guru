- id: aeoi_polymorphic_target
  type: polymorphic
  description: AEOI.OBJKT resolves to BOMs (STKO) when AETYP='02' or routings (PLKO)
    when AETYP='24'; the AETYP discriminator picks the target table.
  from:
    table: AEOI
    fields:
    - AETYP
    - OBJKT
  object_resolution:
  - klart: '02'
    target_table: STKO
    objek_format: STLTY 'M' + STLNR + STLAL
    via_inob: false
  - klart: '24'
    target_table: PLKO
    objek_format: PLNTY '2' + PLNNR
    via_inob: false
