relationships:
- id: makt_to_mara
  description: Material description per language.
  from:
    table: MAKT
    fields:
    - MATNR
  to:
    table: MARA
    fields:
    - MATNR
  cardinality: many_to_one
  optional: false
  sql_example: 'SELECT a.MATNR, b.MAKTX FROM MARA a JOIN MAKT b ON a.MATNR=b.MATNR
    WHERE b.SPRAS=''E'';

    '
- id: marc_to_mara
  description: Plant extension of material.
  from:
    table: MARC
