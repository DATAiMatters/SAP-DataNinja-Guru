domain:
  id: sap_bom_routings_recipe
  name: SAP BOM, Routings, Recipes
  sap_module: PP
  description: 'Models the core SAP PP master data triangle: Bills of Material (BOM),
    Routings/Master Recipes (task lists), and the Engineering Change Management (ECM)
    layer that controls valid-from dating and revision history. Consultants use this
    when reconciling production versions, tracing component allocation from routing
    operations to BOM items, or auditing changes via CDHDR/CDPOS. Classification (KSSK/AUSP/INOB)
    hangs off both materials/batches and BOM/routing objects, so polymorphic resolution
    rules matter.

    '
tables:
- id: MARA
  name: Material Master — General Data
  cluster: pp_material
  description: Client-level material master. Root of all material-related joins; carries
    material type, group, division, base UoM, and product hierarchy.
  key_fields:
  - MATNR
  fields:
  - name: MATNR
    description: Material number
  - name: MTART
    description: Material type (FK to T134)
  - name: MATKL
    description: Material group (FK to T023)
  - name: SPART
    description: Division code (FK to TSPA)
  - name: PRDHA
    description: Product hierarchy (FK to T179)
  - name: MEINS
    description: Base unit of measure (FK to T006)
- id: MAKT
  name: Material Description
  cluster: pp_material
  description: Language-dependent material short text. Always join with SPRAS filter.
  key_fields:
  - MATNR
  - SPRAS
  fields:
