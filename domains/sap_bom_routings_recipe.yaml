  - ATINN
  - ATZHL
  - KLART
  - MAFID
  - KLATR
  fields:
  - name: OBJEK
    description: Object classification key
  - name: ATINN
    description: Internal characteristic
  - name: ATZHL
    description: Value counter
  - name: KLART
    description: Class type
  - name: MAFID
    description: Object/class indicator
  - name: KLATR
    description: Internal class number
  - name: ATWRT
    description: Char value
  - name: MSEHI
    description: UoM
- id: CABN
  name: Characteristic Master
  cluster: classification_characteristic
  description: Characteristic definition keyed by ATINN.
  key_fields:
  - ATINN
